<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AwareMe - Analysis Calendar</title>
<style>
:root {
    --bg-dark: #070B0B; 
    --accent-primary: #74C69D; 
    --accent-secondary: #2D6A4F;
    --soft-mint: #D8F3DC; 
    --text-muted: #94A3A1;
    --color-forest: #2D6A4F;
    --color-mint: #74C69D;
    --color-slate: #4A5D5C;
    --color-silver: #A8B5B2;
}

body {
    background-color: var(--bg-dark);
    margin: 0;
    display: flex;
    justify-content: center;
    align-items: center;
    font-family: 'Inter', sans-serif;
    min-height: 100vh;
    overflow-x: hidden;
    position: relative;
    color: white;
    transition: transform 0.8s cubic-bezier(0.7, 0, 0.3, 1), opacity 0.8s ease;
}

body.scroll-up-effect {
    transform: translateY(-100vh);
    opacity: 0;
}

.sphere {
    position: absolute;
    border-radius: 50%;
    filter: blur(50px);
    z-index: 1;
    opacity: 0.4;
    animation: move 25s infinite alternate ease-in-out;
}

.s1 { width: 180px; height: 180px; background: var(--color-forest); top: 5%; left: 10%; }
.s2 { width: 250px; height: 250px; background: var(--color-mint); bottom: 10%; right: 5%; }

@keyframes move {
    0% { transform: translate(0, 0) scale(1); }
    50% { transform: translate(80px, 100px) scale(1.1); }
    100% { transform: translate(-30px, 50px) scale(0.95); }
}

.glass-plate {
    width: 380px;
    background: rgba(11, 20, 19, 0.8);
    backdrop-filter: blur(30px);
    -webkit-backdrop-filter: blur(30px);
    border-radius: 40px;
    padding: 35px;
    position: relative;
    z-index: 10;
    border: 1px solid rgba(116, 198, 157, 0.2);
    box-shadow: 0 40px 80px rgba(0, 0, 0, 0.6);
}

.context-tag {
    text-align: center;
    font-size: 10px;
    letter-spacing: 2px;
    color: var(--accent-primary);
    margin-bottom: 20px;
    text-transform: uppercase;
    font-weight: 900;
}

.header {
    display: flex;
    justify-content: space-between;
    align-items: center;
    margin-bottom: 20px;
}

.month-title { font-size: 13px; font-weight: 800; letter-spacing: 3px; }

.nav-btn {
    background: rgba(255, 255, 255, 0.05);
    border: 1px solid rgba(116, 198, 157, 0.2);
    color: var(--soft-mint);
    padding: 6px 14px;
    border-radius: 50px;
    font-size: 9px;
    cursor: pointer;
}

.grid { display: grid; grid-template-columns: repeat(7, 1fr); gap: 8px; }
.day-name { font-size: 9px; text-align: center; color: var(--accent-primary); opacity: 0.5; font-weight: 700; }

.day {
    aspect-ratio: 1;
    background: rgba(255, 255, 255, 0.03);
    border-radius: 50%;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 12px;
    color: var(--text-muted);
    cursor: pointer;
    transition: 0.3s;
}

.day.selected {
    background: var(--accent-primary);
    color: var(--bg-dark);
    font-weight: 900;
    box-shadow: 0 0 20px rgba(116, 198, 157, 0.5);
}

.day.has-data {
    color: var(--soft-mint);
    background: rgba(116, 198, 157, 0.15);
    font-weight: 700;
}

.day.has-data:hover {
    background: rgba(116, 198, 157, 0.3);
}

.day.no-data {
    color: rgba(148, 163, 161, 0.3);
    cursor: not-allowed;
    pointer-events: none;
}

.toast {
    position: fixed;
    top: 20px;
    left: 50%;
    transform: translateX(-50%) translateY(-100px);
    background: rgba(220, 53, 69, 0.9);
    color: white;
    padding: 12px 24px;
    border-radius: 12px;
    font-size: 11px;
    letter-spacing: 1px;
    z-index: 9999;
    opacity: 0;
    transition: all 0.4s ease;
    backdrop-filter: blur(10px);
}

.toast.info {
    background: rgba(116, 198, 157, 0.9);
    color: var(--bg-dark);
}

.toast.show {
    transform: translateX(-50%) translateY(0);
    opacity: 1;
}

.scanning-indicator {
    text-align: center;
    font-size: 9px;
    letter-spacing: 1px;
    color: var(--accent-primary);
    margin-top: 10px;
    display: none;
    animation: pulse 1.5s infinite;
}

.scanning-indicator.active { display: block; }

@keyframes pulse {
    0%, 100% { opacity: 0.5; }
    50% { opacity: 1; }
}

.upload-section {
    margin-top: 25px;
    padding: 20px;
    background: rgba(116, 198, 157, 0.05);
    border: 1px dashed rgba(116, 198, 157, 0.3);
    border-radius: 20px;
    text-align: center;
    display: none;
}

.upload-section.active { display: block; }

.file-label {
    display: block;
    font-size: 10px;
    letter-spacing: 1px;
    color: var(--soft-mint);
    cursor: pointer;
    border: 1px solid rgba(116, 198, 157, 0.4);
    padding: 8px;
    border-radius: 10px;
    transition: 0.3s;
}

.file-label:hover { background: rgba(116, 198, 157, 0.1); }

#fileNameDisplay {
    margin-top: 10px;
    font-size: 9px;
    color: var(--accent-primary);
    word-break: break-all;
}

.start-btn {
    margin-top: 20px;
    width: 100%;
    padding: 16px;
    border-radius: 50px;
    border: none;
    font-weight: 900;
    font-size: 11px;
    letter-spacing: 4px;
    text-transform: uppercase;
    background: var(--accent-primary);
    color: var(--bg-dark);
    cursor: pointer;
    display: none;
    transition: opacity 0.3s ease;
}

.start-btn.show { display: block; animation: fadeInUp 0.6s ease forwards; }

/* Disabled state styling */
.start-btn:disabled {
    background: #4A5D5C;
    cursor: not-allowed;
    opacity: 0.6;
}

@keyframes fadeInUp {
    from { opacity: 0; transform: translateY(20px); }
    to { opacity: 1; transform: translateY(0); }
}
</style>
</head>

<body>

<a href="/home" style="position:fixed;top:20px;left:20px;z-index:9999;display:flex;align-items:center;gap:8px;padding:10px 20px;background:rgba(11,20,19,0.8);backdrop-filter:blur(15px);border:1px solid rgba(116,198,157,0.25);border-radius:50px;color:#D8F3DC;text-decoration:none;font-family:'Inter',sans-serif;font-size:13px;font-weight:700;letter-spacing:1px;text-transform:uppercase;transition:all 0.3s ease;box-shadow:0 4px 20px rgba(0,0,0,0.3);" onmouseover="this.style.background='rgba(45,106,79,0.6)';this.style.borderColor='rgba(116,198,157,0.5)';" onmouseout="this.style.background='rgba(11,20,19,0.8)';this.style.borderColor='rgba(116,198,157,0.25)';"><svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="#74C69D" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"/><polyline points="9 22 9 12 15 12 15 22"/></svg>Home</a>

<div class="sphere s1"></div>
<div class="sphere s2"></div>
<div id="toast" class="toast"></div>

<div class="glass-plate">
    <div class="context-tag" id="platformDisplay">Initializing...</div>

    <div class="header">
        <button class="nav-btn" onclick="moveMonth(-1)">PREV</button>
        <div class="month-title" id="monthYear"></div>
        <button class="nav-btn" onclick="moveMonth(1)">NEXT</button>
    </div>

    <div class="grid" id="calendarGrid"></div>

    <div id="scanningIndicator" class="scanning-indicator">SCANNING FILE FOR AVAILABLE DATES...</div>

    <div id="uploadContainer" class="upload-section">
        <div style="font-size: 9px; margin-bottom: 10px; color: var(--text-muted); letter-spacing: 1px;">ATTACH PLATFORM DATA (.ZIP PREFERRED)</div>
        <label for="fileInput" class="file-label">BROWSE FILES</label>
        <input type="file" id="fileInput" style="display:none;" accept=".html,.zip" onchange="updateFileName()">
        <div id="fileNameDisplay"></div>
    </div>

    <button id="startBtn" class="start-btn" onclick="startAnalysis()">Start Analyzing</button>
</div>

<script>
    let currentMonth = new Date().getMonth();
    let currentYear = new Date().getFullYear();
    let selectedDateStr = null;
    let availableDates = new Set(); // dates that have data
    let datesLoaded = false;        // whether we've scanned the file

    const urlParams = new URLSearchParams(window.location.search);
    const selectedPlatform = urlParams.get('platform') || 'youtube'; 
    
    document.getElementById('platformDisplay').innerText = `Analyzing: ${selectedPlatform}`;

    // Show file upload section only for social media platforms (not for safespace)
    const platformsWithFileUpload = ['youtube', 'instagram', 'reddit', 'twitter'];
    if (platformsWithFileUpload.includes(selectedPlatform)) {
        document.getElementById('uploadContainer').classList.add('active');
    }

    // Toast notification
    function showToast(message, type = 'error', duration = 3000) {
        const toast = document.getElementById('toast');
        toast.innerText = message;
        toast.className = 'toast' + (type === 'info' ? ' info' : '');
        toast.classList.add('show');
        setTimeout(() => toast.classList.remove('show'), duration);
    }

    // Fetch available dates from server after file upload
    async function fetchAvailableDates(file) {
        const indicator = document.getElementById('scanningIndicator');
        indicator.classList.add('active');

        const formData = new FormData();
        formData.append('platform', selectedPlatform);
        formData.append('file', file);

        try {
            const response = await fetch('/api/available-dates', {
                method: 'POST',
                body: formData
            });
            const data = await response.json();

            if (data.status === 'success' && data.dates) {
                availableDates = new Set(data.dates);
                datesLoaded = true;
                updateCalendar();
                showToast(`Found data for ${data.total} dates`, 'info', 3000);
            } else {
                showToast(data.error || 'Could not read dates from file');
            }
        } catch (e) {
            console.error('Error fetching dates:', e);
            showToast('Error scanning file for dates');
        } finally {
            indicator.classList.remove('active');
        }
    }

    // For safespace, load dates immediately (no file needed)
    async function fetchSafespaceAvailableDates() {
        const indicator = document.getElementById('scanningIndicator');
        indicator.classList.add('active');

        const formData = new FormData();
        formData.append('platform', 'safespace');

        try {
            const response = await fetch('/api/available-dates', {
                method: 'POST',
                body: formData
            });
            const data = await response.json();

            if (data.status === 'success' && data.dates) {
                availableDates = new Set(data.dates);
                datesLoaded = true;
                updateCalendar();
                if (data.total > 0) {
                    showToast(`Found data for ${data.total} dates`, 'info', 3000);
                } else {
                    showToast('No chat history data found yet', 'error', 4000);
                }
            }
        } catch (e) {
            console.error('Error fetching safespace dates:', e);
        } finally {
            indicator.classList.remove('active');
        }
    }

    // Validation logic
    function validateRequirements() {
        const startBtn = document.getElementById('startBtn');
        const fileInput = document.getElementById('fileInput');
        
        const dateSelected = selectedDateStr !== null;
        const fileAttached = fileInput.files.length > 0;

        if (dateSelected) {
            startBtn.classList.add("show");
        }

        if (selectedPlatform === 'safespace') {
            startBtn.disabled = !dateSelected;
        } else {
            startBtn.disabled = !(dateSelected && fileAttached);
            
            if (dateSelected && !fileAttached) {
                startBtn.innerText = "Upload File to Start";
            } else {
                startBtn.innerText = "Start Analyzing";
            }
        }
    }

    function updateFileName() {
        const input = document.getElementById('fileInput');
        const display = document.getElementById('fileNameDisplay');
        display.innerText = input.files.length > 0 ? `Ready: ${input.files[0].name}` : "";
        validateRequirements();

        // Auto-scan file for available dates
        if (input.files.length > 0) {
            selectedDateStr = null; // reset date selection when new file uploaded
            document.querySelectorAll('.day').forEach(el => el.classList.remove('selected'));
            fetchAvailableDates(input.files[0]);
        }
    }

    function updateCalendar() {
        const grid = document.getElementById('calendarGrid');
        const title = document.getElementById('monthYear');
        
        grid.innerHTML = '';
        const date = new Date(currentYear, currentMonth);
        title.innerText = date.toLocaleDateString('en-US', { month: 'short', year: 'numeric' }).toUpperCase();

        ['S','M','T','W','T','F','S'].forEach(d => {
            const div = document.createElement('div');
            div.className = 'day-name'; div.innerText = d; grid.appendChild(div);
        });

        const firstDay = new Date(currentYear, currentMonth, 1).getDay();
        const daysInMonth = new Date(currentYear, currentMonth + 1, 0).getDate();

        for (let i = 0; i < firstDay; i++) grid.appendChild(document.createElement('div'));

        for (let d = 1; d <= daysInMonth; d++) {
            const day = document.createElement('div');
            const m = String(currentMonth + 1).padStart(2, '0');
            const dayNum = String(d).padStart(2, '0');
            const dateStr = `${currentYear}-${m}-${dayNum}`;

            day.className = 'day';
            day.innerText = d;

            if (datesLoaded) {
                if (availableDates.has(dateStr)) {
                    day.classList.add('has-data');
                    day.onclick = () => {
                        document.querySelectorAll('.day').forEach(el => el.classList.remove('selected'));
                        day.classList.add('selected');
                        selectedDateStr = dateStr;
                        validateRequirements();
                    };
                } else {
                    day.classList.add('no-data');
                }
            } else {
                // Dates not loaded yet — allow clicking any date
                day.onclick = () => {
                    document.querySelectorAll('.day').forEach(el => el.classList.remove('selected'));
                    day.classList.add('selected');
                    selectedDateStr = dateStr;
                    validateRequirements();
                };
            }

            // Restore selection
            if (dateStr === selectedDateStr) {
                day.classList.add('selected');
            }

            grid.appendChild(day);
        }
    }

    function moveMonth(dir) {
        currentMonth += dir;
        if(currentMonth < 0) { currentMonth = 11; currentYear--; } 
        else if(currentMonth > 11) { currentMonth = 0; currentYear++; }
        updateCalendar();
    }

    async function startAnalysis() {
        if (document.getElementById('startBtn').disabled) return;

        // Validate a date was actually selected
        if (!selectedDateStr || selectedDateStr === 'null') {
            showToast('Please select a date first.');
            return;
        }

        // Double-check date has data (if dates were loaded)
        if (datesLoaded && !availableDates.has(selectedDateStr)) {
            showToast(`No data available for ${selectedDateStr}. Please pick a highlighted date.`);
            return;
        }
        
        const btn = document.getElementById('startBtn');
        const fileInput = document.getElementById('fileInput');

        const formData = new FormData();
        formData.append('date', selectedDateStr);
        formData.append('platform', selectedPlatform);
        
        if (selectedPlatform !== 'safespace' && fileInput.files[0]) {
            formData.append('file', fileInput.files[0]);
        }

        btn.innerText = "PROCESSING...";
        btn.disabled = true;

        try {
            const response = await fetch('/api/run-analysis', {
                method: 'POST',
                body: formData 
            });

            const data = await response.json();

            if (data.status === "success") {
                document.body.classList.add('scroll-up-effect');
                setTimeout(() => {
                    window.location.href = data.redirect;
                }, 600);
            } else {
                showToast(data.message || data.error || "Analysis failed");
                btn.innerText = "RETRY ANALYSIS";
                btn.disabled = false;
                validateRequirements();
            }
        } catch (e) {
            console.error(e);
            showToast("Error connecting to server.");
            btn.innerText = "RETRY ANALYSIS";
            btn.disabled = false;
            validateRequirements();
        }
    }

    updateCalendar();

    // Auto-load dates for safespace (no file needed)
    if (selectedPlatform === 'safespace') {
        fetchSafespaceAvailableDates();
    }
</script>
</body>
</html>
