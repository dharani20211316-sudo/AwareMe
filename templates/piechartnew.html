<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>3D Cognitive Distortion Analysis</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;700;900&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-dark: #070B0B; 
            --accent-primary: #74C69D; 
            --accent-secondary: #2D6A4F;
            --soft-mint: #D8F3DC; 
            --text-muted: #94A3A1;
            --glass: rgba(11, 20, 19, 0.7); /* Slightly more transparent for liquid effect */
            --glass-border: rgba(116, 198, 157, 0.2);
        }

        body { 
            margin: 0; 
            background-color: var(--bg-dark);
            overflow-x: hidden;
            overflow-y: auto; 
            font-family: 'Inter', sans-serif;
            color: white;
        }
        
        .sphere {
            position: fixed;
            border-radius: 50%;
            filter: blur(80px);
            z-index: -1;
            opacity: 0.2;
            animation: move 25s infinite alternate ease-in-out;
        }
        .s1 { width: 400px; height: 400px; background: var(--accent-secondary); top: -10%; left: -10%; }
        .s2 { width: 500px; height: 500px; background: var(--accent-primary); bottom: -10%; right: -10%; }
        
        @keyframes move {
            0% { transform: translate(0, 0) scale(1); }
            100% { transform: translate(100px, 150px) scale(1.2); }
        }

        #report {
            position: relative;
            width: 100vw;
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        #legend-container {
            position: absolute; 
            left: 50px; 
            top: 50%;
            transform: translateY(-50%);
            display: flex;
            flex-direction: column;
            gap: 15px;
            z-index: 100;
            padding: 35px;
            background: var(--glass);
            backdrop-filter: blur(25px) saturate(180%); /* Stronger liquid feel */
            border: 1px solid var(--glass-border);
            border-radius: 30px;
            box-shadow: 0 25px 60px rgba(0,0,0,0.6);
            min-width: 280px;
        }

        .legend-title {
            font-weight: 900;
            font-size: 11px;
            letter-spacing: 4px;
            color: var(--accent-primary);
            margin-bottom: 15px;
            text-transform: uppercase;
            border-bottom: 1px solid var(--glass-border);
            padding-bottom: 12px;
            opacity: 0.8;
        }

        .legend-item {
            font-size: 13px;
            font-weight: 700;
            letter-spacing: 1px;
            text-transform: uppercase;
            opacity: 0;
            transform: translateX(-30px);
            transition: all 0.7s cubic-bezier(0.23, 1, 0.32, 1);
            display: flex;
            align-items: center;
            line-height: 1.4;
        }

        .legend-color-dot {
            width: 10px;
            height: 10px;
            border-radius: 50%;
            margin-right: 15px;
            flex-shrink: 0;
            box-shadow: 0 0 12px currentColor;
        }

        canvas { display: block; outline: none; cursor: pointer; }
        
        #header-title {
            position: absolute;
            top: 40px;
            font-weight: 900;
            font-size: 14px;
            letter-spacing: 6px;
            text-transform: uppercase;
            color: var(--soft-mint);
            background: var(--glass);
            padding: 12px 30px;
            border-radius: 60px;
            border: 1px solid var(--glass-border);
            backdrop-filter: blur(10px);
            box-shadow: 0 10px 30px rgba(0,0,0,0.3);
            z-index: 10;
        }

        /* --- LIQUID GLASS TABLE STYLES --- */
        .table-container {
            width: 90%;
            max-width: 1200px;
            margin: 0 auto 100px auto;
            background: var(--glass);
            backdrop-filter: blur(25px) saturate(180%);
            border: 1px solid var(--glass-border);
            border-radius: 30px;
            padding: 40px;
            box-shadow: 0 25px 60px rgba(0,0,0,0.4), 
                        inset 0 0 20px rgba(116, 198, 157, 0.05); /* Soft inner glow */
        }

        .data-table {
            width: 100%;
            border-collapse: collapse;
            color: white;
            text-align: left;
        }

        .data-table th {
            color: var(--accent-primary);
            text-transform: uppercase;
            font-size: 11px;
            letter-spacing: 2px;
            padding: 15px;
            border-bottom: 1px solid var(--glass-border);
        }

        .data-table td {
            padding: 20px 15px;
            font-size: 14px;
            border-bottom: 1px solid rgba(255, 255, 255, 0.05);
        }

        .data-table tr:hover {
            background: rgba(116, 198, 157, 0.1); /* Subtle highlight */
        }

        .distortion-badge {
            background: var(--accent-secondary);
            color: var(--soft-mint);
            padding: 4px 12px;
            border-radius: 20px;
            font-weight: 700;
            font-size: 12px;
        }

        /* Link Styles for Titles */
        .video-link {
            color: white;
            text-decoration: none;
            transition: color 0.3s ease;
            cursor: pointer;
        }

        .video-link:hover {
            color: var(--accent-primary);
            text-decoration: underline;
        }
    </style>
</head>
<body>

<div class="sphere s1"></div>
<div class="sphere s2"></div>

<div id="report">
    <div id="header-title">Distortion Impact Analysis</div>
    <div id="legend-container">
        <div class="legend-title">Identified Patterns</div>
    </div>
</div>

<div class="table-container">
    <div class="legend-title">Video Breakdown Detail</div>
    <table class="data-table">
        <thead>
            <tr>
                <th>Timestamp</th>
                <th>Video Title</th>
                <th>Distortion Percentage</th>
            </tr>
        </thead>
        <tbody id="stats-table-body">
            </tbody>
    </table>
</div>

<script type="module">
import * as THREE from 'https://cdn.jsdelivr.net/npm/three@0.136.0/build/three.module.js';

/* -----------------------------
   1️⃣ DATA FETCHING & SORTING
------------------------------*/
async function fetchPieData() {
    try {
        const response = await fetch("/api/distortion-breakdown"); 
        const result = await response.json();
        if (!result || result.status === "error") throw new Error();
        
        return Object.entries(result)
            .map(([label, val]) => ({ label, value: parseFloat(val) }))
            .sort((a, b) => b.value - a.value);
    } catch (err) {
        return [
            {label: "All-or-Nothing Thinking", value: 33.3},
            {label: "Catastrophizing", value: 15.5},
            {label: "Personalization", value: 8.2},
            {label: "Mental Filtering", value: 0},
            {label: "Emotional Reasoning", value: 0}
        ].sort((a,b) => b.value - a.value);
    }
}

async function fetchTableData() {
    try {
        const response = await fetch("/api/video-stats-table");
        const data = await response.json();
        const tbody = document.getElementById('stats-table-body');
        
        data.forEach(item => {
            const row = document.createElement('tr');
            // Encode the title for the URL parameter
            const encodedTitle = encodeURIComponent(item.video_title);
            
            row.innerHTML = `
                <td>${item.timestamp}</td>
                <td style="font-weight: 700;">
                    <a href="/transcript?title=${encodedTitle}" class="video-link">
                        ${item.video_title}
                    </a>
                </td>
                <td><span class="distortion-badge">${item.distortion_percentage.toFixed(1)}%</span></td>
            `;
            tbody.appendChild(row);
        });
    } catch (err) {
        console.error("Error loading table data:", err);
    }
}

/* -----------------------------
   2️⃣ 3D SCENE SETUP
------------------------------*/
fetchPieData().then((sortedData) => {
    fetchTableData();

    const scene = new THREE.Scene();
    const camera = new THREE.PerspectiveCamera(38, window.innerWidth / window.innerHeight, 0.1, 1000);
    camera.position.set(0, 22, 28);
    camera.lookAt(0, 0, 0);

    const renderer = new THREE.WebGLRenderer({ antialias: true, alpha: true });
    renderer.setSize(window.innerWidth, window.innerHeight);
    renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
    document.getElementById('report').appendChild(renderer.domElement);

    scene.add(new THREE.AmbientLight(0xffffff, 0.5));
    const spot = new THREE.SpotLight(0xffffff, 1);
    spot.position.set(20, 40, 20);
    scene.add(spot);

    const chartGroup = new THREE.Group();
    scene.add(chartGroup);

    const palette = ['#00FFCC', '#A670FF', '#FF70A6', '#70D6FF', '#FFD670', '#FF9770', '#E9FF70'];

    const activeItems = sortedData.filter(d => d.value > 0);
    const totalValue = activeItems.reduce((s, i) => s + i.value, 0);

    const meshes = [];
    const raycaster = new THREE.Raycaster();
    const mouse = new THREE.Vector2();
    let currentStartAngle = 0;

    const legendContainer = document.getElementById('legend-container');

    activeItems.forEach((item, i) => {
        const normalizedValue = (item.value / totalValue) * 100;
        const angle = (normalizedValue / 100) * Math.PI * 2;
        const midAngle = currentStartAngle + (angle / 2);
        const colorStr = palette[i % palette.length];

        const leg = document.createElement('div');
        leg.className = 'legend-item';
        leg.style.color = colorStr;
        leg.innerHTML = `<div class="legend-color-dot" style="background:${colorStr}"></div>
                         <span>${item.label}: ${item.value.toFixed(1)}%</span>`;
        legendContainer.appendChild(leg);
        
        setTimeout(() => { 
            leg.style.opacity = '1'; 
            leg.style.transform = 'translateX(0)'; 
        }, 600 + (i * 150));

        const shape = new THREE.Shape();
        shape.moveTo(0, 0);
        shape.absarc(0, 0, 8.5, currentStartAngle, currentStartAngle + angle, false);
        shape.lineTo(0, 0);

        const geo = new THREE.ExtrudeGeometry(shape, { depth: 1.8, bevelEnabled: true, bevelThickness: 0.4, bevelSize: 0.3 });
        const mat = new THREE.MeshPhongMaterial({ 
            color: colorStr, 
            shininess: 100, 
            specular: 0x444444,
            transparent: true,
            opacity: 0.95 
        });
        
        const mesh = new THREE.Mesh(geo, mat);
        mesh.rotation.x = -Math.PI / 2;
        mesh.scale.set(0, 0, 0); 
        
        mesh.userData = { midAngle: midAngle, label: item.label, isPopped: false };
        chartGroup.add(mesh);
        meshes.push(mesh);
        currentStartAngle += angle;
    });

    window.addEventListener('mousemove', (e) => {
        mouse.x = (e.clientX / window.innerWidth) * 2 - 1;
        mouse.y = -(e.clientY / window.innerHeight) * 2 + 1;
    });

    window.addEventListener('click', () => {
        raycaster.setFromCamera(mouse, camera);
        const intersects = raycaster.intersectObjects(meshes);
        if (intersects.length > 0) {
            const obj = intersects[0].object;
            const dist = 1.5;
            if (!obj.userData.isPopped) {
                obj.position.x += Math.cos(obj.userData.midAngle) * dist;
                obj.position.z -= Math.sin(obj.userData.midAngle) * dist;
                obj.userData.isPopped = true;
            } else {
                obj.position.set(0,0,0);
                obj.userData.isPopped = false;
            }
        }
    });

    let startTime = null;
    function animate(time) {
        if (!startTime) startTime = time;
        const elapsed = time - startTime;
        meshes.forEach((mesh, i) => {
            const delay = 400 + (i * 200);
            if (elapsed > delay) {
                const progress = Math.min((elapsed - delay) / 1200, 1);
                const s = progress === 1 ? 1 : 1 - Math.pow(2, -10 * progress) * Math.cos(progress * Math.PI * 1.5);
                if (!mesh.userData.isPopped) mesh.scale.set(s, s, s);
            }
        });

        raycaster.setFromCamera(mouse, camera);
        const intersects = raycaster.intersectObjects(meshes);
        meshes.forEach(m => m.material.emissive.setHex(0x000000));
        if (intersects.length > 0) {
            intersects[0].object.material.emissive.setHex(0x222222);
        }

        chartGroup.rotation.y += 0.0015;
        renderer.render(scene, camera);
        requestAnimationFrame(animate);
    }
    requestAnimationFrame(animate);

    window.addEventListener('resize', () => {
        camera.aspect = window.innerWidth / window.innerHeight;
        camera.updateProjectionMatrix();
        renderer.setSize(window.innerWidth, window.innerHeight);
    });
});
</script>

</body>
</html>
