<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Chat Reflection Analysis</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;700;900&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-dark: #070B0B; 
            --accent-primary: #74C69D; 
            --accent-secondary: #2D6A4F;
            --soft-mint: #D8F3DC; 
            --text-muted: #94A3A1;
            --glass: rgba(11, 20, 19, 0.7);
            --glass-border: rgba(116, 198, 157, 0.2);
        }

        body { 
            margin: 0; 
            background-color: var(--bg-dark);
            overflow-x: hidden;
            font-family: 'Inter', sans-serif;
            color: white;
        }
        
        /* Background Spheres */
        .sphere {
            position: fixed; border-radius: 50%; filter: blur(80px); z-index: -1; opacity: 0.2;
            animation: move 25s infinite alternate ease-in-out;
        }
        .s1 { width: 400px; height: 400px; background: var(--accent-secondary); top: -10%; left: -10%; }
        .s2 { width: 500px; height: 500px; background: var(--accent-primary); bottom: -10%; right: -10%; }
        
        @keyframes move {
            0% { transform: translate(0, 0) scale(1); }
            100% { transform: translate(100px, 150px) scale(1.2); }
        }

        #report { position: relative; width: 100vw; height: 100vh; display: flex; justify-content: center; align-items: center; }

        #legend-container {
            position: absolute; left: 50px; top: 50%; transform: translateY(-50%);
            display: flex; flex-direction: column; gap: 15px; z-index: 100;
            padding: 35px; background: var(--glass); backdrop-filter: blur(25px);
            border: 1px solid var(--glass-border); border-radius: 30px;
            box-shadow: 0 25px 60px rgba(0,0,0,0.6); min-width: 280px;
        }

        .legend-title {
            font-weight: 900; font-size: 11px; letter-spacing: 4px; color: var(--accent-primary);
            margin-bottom: 15px; text-transform: uppercase; border-bottom: 1px solid var(--glass-border);
            padding-bottom: 12px; opacity: 0.8;
        }

        .legend-item {
            font-size: 13px; font-weight: 700; letter-spacing: 1px; text-transform: uppercase;
            opacity: 0; transform: translateX(-30px); transition: all 0.7s ease;
            display: flex; align-items: center;
        }

        .legend-color-dot { width: 10px; height: 10px; border-radius: 50%; margin-right: 15px; box-shadow: 0 0 12px currentColor; }

        canvas { display: block; cursor: pointer; }
        
        #header-title {
            position: absolute; top: 40px; font-weight: 900; font-size: 14px; letter-spacing: 6px;
            text-transform: uppercase; color: var(--soft-mint); background: var(--glass);
            padding: 12px 30px; border-radius: 60px; border: 1px solid var(--glass-border);
            backdrop-filter: blur(10px); z-index: 10;
        }

        .table-container {
            width: 90%; max-width: 1200px; margin: 0 auto 100px auto;
            background: var(--glass); backdrop-filter: blur(25px);
            border: 1px solid var(--glass-border); border-radius: 30px; padding: 40px;
        }

        .data-table { width: 100%; border-collapse: collapse; color: white; text-align: left; }
        .data-table th { color: var(--accent-primary); text-transform: uppercase; font-size: 11px; letter-spacing: 2px; padding: 15px; border-bottom: 1px solid var(--glass-border); }
        .data-table td { padding: 20px 15px; font-size: 14px; border-bottom: 1px solid rgba(255, 255, 255, 0.05); }
        .distortion-badge { background: var(--accent-secondary); color: var(--soft-mint); padding: 4px 12px; border-radius: 20px; font-weight: 700; font-size: 12px; }
        .chat-text { font-style: italic; color: var(--text-muted); line-height: 1.6; }

        /* Mobile responsiveness */
        @media (max-width: 768px) {
            #legend-container {
                position: relative;
                left: auto;
                top: auto;
                transform: none;
                margin: 20px auto;
                width: 90%;
                max-width: 400px;
            }

            .table-container {
                width: 95%;
                padding: 20px;
                margin-bottom: 50px;
            }

            .data-table th,
            .data-table td {
                padding: 10px 5px;
                font-size: 12px;
            }

            .data-table th {
                font-size: 10px;
            }
        }

        @media (max-width: 480px) {
            .legend-item {
                flex-direction: column;
                align-items: flex-start;
                gap: 5px;
            }

            .table-container {
                padding: 15px;
            }

            .data-table {
                font-size: 11px;
            }

            .data-table td {
                padding: 8px 3px;
            }
        }
    </style>
</head>
<body>

<div class="sphere s1"></div>
<div class="sphere s2"></div>

<div id="report">
    <div id="header-title">Chat Reflection Analytics</div>
    <div id="legend-container">
        <div class="legend-title">Cognitive Patterns</div>
    </div>
</div>

<div class="table-container">
    <div class="legend-title">Daily Conversation Breakdown</div>
    <table class="data-table">
        <thead>
            <tr>
                <th>Time</th>
                <th>Conversation Snippet</th>
                <th>Distortion Hits</th>
            </tr>
        </thead>
        <tbody id="stats-table-body"></tbody>
    </table>
</div>

<script type="module">
import * as THREE from 'https://cdn.jsdelivr.net/npm/three@0.136.0/build/three.module.js';

/* -----------------------------
   1️⃣ DATA FETCHING (Unified for Chats)
------------------------------*/
async function loadDashboard() {
    try {
        // We fetch the latest chat analysis document
        const response = await fetch("/api/get-latest-chat-analysis"); 
        const data = await response.json(); // Expected: { daily_summary: {}, entries: [] }

        renderTable(data.entries);
        render3DChart(aggregateDistortions(data.entries));
    } catch (err) {
        console.error("Fetch error:", err);
    }
}

function aggregateDistortions(entries) {
    const counts = {};
    entries.forEach(entry => {
        // Merge Regex and LLM analysis counts
        Object.entries(entry.regex_analysis).forEach(([label, list]) => {
            if (list.length > 0) counts[label] = (counts[label] || 0) + list.length;
        });
    });
    return Object.entries(counts).map(([label, value]) => ({ label, value }));
}

function renderTable(entries) {
    const tbody = document.getElementById('stats-table-body');
    entries.forEach(item => {
        const row = document.createElement('tr');
        const timeOnly = item.timestamp.split(' ')[1];
        
        // Count total unique phrases found
        const totalHits = Object.values(item.regex_analysis).flat().length;

        row.innerHTML = `
            <td style="white-space:nowrap">${timeOnly}</td>
            <td class="chat-text">"${item.transcript.substring(0, 80)}..."</td>
            <td><span class="distortion-badge">${totalHits} Patterns</span></td>
        `;
        tbody.appendChild(row);
    });
}

/* -----------------------------
   2️⃣ 3D SCENE LOGIC
------------------------------*/
function render3DChart(chartData) {
    const scene = new THREE.Scene();
    const camera = new THREE.PerspectiveCamera(38, window.innerWidth / window.innerHeight, 0.1, 1000);
    camera.position.set(0, 22, 28);
    camera.lookAt(0, 0, 0);

    const renderer = new THREE.WebGLRenderer({ antialias: true, alpha: true });
    renderer.setSize(window.innerWidth, window.innerHeight);
    document.getElementById('report').appendChild(renderer.domElement);

    scene.add(new THREE.AmbientLight(0xffffff, 0.5));
    const spot = new THREE.SpotLight(0xffffff, 1);
    spot.position.set(20, 40, 20);
    scene.add(spot);

    const chartGroup = new THREE.Group();
    scene.add(chartGroup);

    const palette = ['#00FFCC', '#A670FF', '#FF70A6', '#70D6FF', '#FFD670'];
    const totalValue = chartData.reduce((s, i) => s + i.value, 0);
    let currentStartAngle = 0;
    const meshes = [];

    chartData.forEach((item, i) => {
        const angle = (item.value / totalValue) * Math.PI * 2;
        const colorStr = palette[i % palette.length];

        // Legend Update
        const leg = document.createElement('div');
        leg.className = 'legend-item';
        leg.style.color = colorStr;
        leg.innerHTML = `<div class="legend-color-dot" style="background:${colorStr}"></div><span>${item.label}</span>`;
        document.getElementById('legend-container').appendChild(leg);
        setTimeout(() => { leg.style.opacity = '1'; leg.style.transform = 'translateX(0)'; }, 600 + (i * 100));

        // Geometry
        const shape = new THREE.Shape();
        shape.moveTo(0, 0);
        shape.absarc(0, 0, 8.5, currentStartAngle, currentStartAngle + angle, false);
        shape.lineTo(0, 0);

        const geo = new THREE.ExtrudeGeometry(shape, { depth: 1.8, bevelEnabled: true });
        const mat = new THREE.MeshPhongMaterial({ color: colorStr, shininess: 100, transparent: true, opacity: 0.9 });
        
        const mesh = new THREE.Mesh(geo, mat);
        mesh.rotation.x = -Math.PI / 2;
        mesh.userData = { midAngle: currentStartAngle + (angle / 2) };
        chartGroup.add(mesh);
        meshes.push(mesh);
        currentStartAngle += angle;
    });

    function animate() {
        chartGroup.rotation.y += 0.002;
        renderer.render(scene, camera);
        requestAnimationFrame(animate);
    }
    animate();
}

loadDashboard();
</script>
</body>
</html>
