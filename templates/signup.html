<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AwareMe Signup</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>
<body>

<a href="/home" style="position:fixed;top:20px;left:20px;z-index:9999;display:flex;align-items:center;gap:8px;padding:10px 20px;background:rgba(11,20,19,0.8);backdrop-filter:blur(15px);border:1px solid rgba(116,198,157,0.25);border-radius:50px;color:#D8F3DC;text-decoration:none;font-family:'Inter',sans-serif;font-size:13px;font-weight:700;letter-spacing:1px;text-transform:uppercase;transition:all 0.3s ease;box-shadow:0 4px 20px rgba(0,0,0,0.3);" onmouseover="this.style.background='rgba(45,106,79,0.6)';this.style.borderColor='rgba(116,198,157,0.5)';" onmouseout="this.style.background='rgba(11,20,19,0.8)';this.style.borderColor='rgba(116,198,157,0.25)';"><svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="#74C69D" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"/><polyline points="9 22 9 12 15 12 15 22"/></svg>Home</a>

    <div class="container">
        <div class="shape silver"></div>
        <div class="shape forest"></div>
        <div class="shape champagne"></div>
        <div class="shape slate"></div>

        <div class="box">
            <form id="signupForm" autocomplete="off">
                <h2>Sign up</h2>

                <div class="inputBox">
                    <input type="text" id="username" required>
                    <span>Username (min 4 chars)</span>
                    <i></i>
                </div>

                <div class="inputBox">
                    <input type="password" id="password" required>
                    <span>Password (min 8 chars)</span>
                    <i></i>
                </div>

                <div class="links">
                    <a href="#">Forgot Password</a>
                    <a href="/">Login</a>
                </div>

                <input type="submit" value="Register">

                <p id="errorMessage" style="color:red; margin-top:10px;"></p>
                <p id="successMessage" style="color:green; margin-top:10px;"></p>
            </form>
        </div>
    </div>

    <script>
        document.getElementById('signupForm').addEventListener('submit', async function(e) {
            e.preventDefault();

            const username = document.getElementById("username").value;
            const password = document.getElementById("password").value;
            const errorMessage = document.getElementById("errorMessage");
            const successMessage = document.getElementById("successMessage");

            errorMessage.textContent = "";
            successMessage.textContent = "";

            try {
                const response = await fetch('/register', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json'
                    },
                    body: JSON.stringify({
                        username: username,
                        password: password
                    })
                });

                const result = await response.json();

                if (response.ok) {
                    successMessage.textContent = result.message || "Registration successful!";
                    // Redirect to login after successful registration
                    setTimeout(() => {
                        window.location.href = '/';
                    }, 2000);
                } else {
                    errorMessage.textContent = result.error || "Registration failed";
                }

            } catch (error) {
                errorMessage.textContent = "Server error. Please try again.";
                console.error(error);
            }
        });
    </script>
</body>
</html>
