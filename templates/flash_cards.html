<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Select Your Platform - AwareMe</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/gsap.min.js"></script>
<style>
    :root {
        --bg-dark: #0B1413; 
        --accent-primary: #74C69D; 
        --soft-mint: #D8F3DC; 
        --text-muted: #94A3A1;
        --ig-glow: rgba(193, 53, 132, 0.5);
        --yt-glow: rgba(255, 0, 0, 0.5);
        --rd-glow: rgba(255, 69, 0, 0.5);
        --tw-glow: rgba(29, 161, 242, 0.5);
        --ss-glow: rgba(116, 198, 157, 0.6);
    }

    body {
        margin: 0;
        background: radial-gradient(circle at center, #0E2623 0%, var(--bg-dark) 100%);
        color: white;
        font-family: 'Inter', sans-serif;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        min-height: 100vh;
        overflow: hidden;
    }

    header {
        position: relative;
        z-index: 2;
        letter-spacing: 12px;
        font-weight: 900;
        text-transform: uppercase;
        font-size: 14px;
        margin-bottom: 40px;
        color: var(--accent-primary);
        opacity: 0.8;
    }

    .carousel-container {
        position: relative;
        z-index: 2;
        width: 100%;
        overflow: hidden;
        padding: 60px 0;
        mask-image: linear-gradient(to right, transparent, black 20%, black 80%, transparent);
    }

    .carousel-track {
        display: flex;
        width: max-content;
        animation: scroll 45s linear infinite;
    }

    .platform-link {
        text-decoration: none;
        margin: 0 25px;
        display: block;
        cursor: pointer;
    }

    .platform-card {
        width: 320px;
        height: 450px;
        background: rgba(7, 18, 17, 0.8);
        backdrop-filter: blur(10px);
        border-radius: 40px;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        position: relative;
        border: 1px solid rgba(116, 198, 157, 0.1);
        transition: all 0.5s cubic-bezier(0.2, 0.8, 0.2, 1);
    }

    .platform-card img {
        width: 60%;
        height: auto;
        mix-blend-mode: screen;
        opacity: 0.85;
    }

    .platform-link:hover .platform-card { transform: scale(1.03) translateY(-10px); }
    .platform-link:hover .ig-card { box-shadow: 0 0 50px var(--ig-glow); border-color: #c13584; }
    .platform-link:hover .yt-card { box-shadow: 0 0 50px var(--yt-glow); border-color: #ff0000; }
    .platform-link:hover .rd-card { box-shadow: 0 0 50px var(--rd-glow); border-color: #ff4500; }
    .platform-link:hover .tw-card { box-shadow: 0 0 50px var(--tw-glow); border-color: #1da1f2; }
    .platform-link:hover .ss-card { box-shadow: 0 0 50px var(--ss-glow); border-color: var(--accent-primary); }

    .platform-name {
        margin-top: 20px;
        letter-spacing: 4px;
        text-transform: uppercase;
        font-size: 11px;
        color: var(--soft-mint);
        opacity: 0.5;
    }

    @keyframes scroll {
        0% { transform: translateX(0); }
        100% { transform: translateX(-50%); }
    }

    footer { margin-top: 50px; letter-spacing: 5px; color: var(--text-muted); font-size: 10px; opacity: 0.5; }
</style>
</head>
<body>

<a href="/home" style="position:fixed;top:20px;left:20px;z-index:9999;display:flex;align-items:center;gap:8px;padding:10px 20px;background:rgba(11,20,19,0.8);backdrop-filter:blur(15px);border:1px solid rgba(116,198,157,0.25);border-radius:50px;color:#D8F3DC;text-decoration:none;font-family:'Inter',sans-serif;font-size:13px;font-weight:700;letter-spacing:1px;text-transform:uppercase;transition:all 0.3s ease;box-shadow:0 4px 20px rgba(0,0,0,0.3);" onmouseover="this.style.background='rgba(45,106,79,0.6)';this.style.borderColor='rgba(116,198,157,0.5)';" onmouseout="this.style.background='rgba(11,20,19,0.8)';this.style.borderColor='rgba(116,198,157,0.25)';"><svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="#74C69D" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"/><polyline points="9 22 9 12 15 12 15 22"/></svg>Home</a>

<header>Select Platform to Analyze</header>

<div class="carousel-container">
    <div class="carousel-track" id="track">
        <a href="javascript:void(0);" onclick="navigateToCalendar('safespace')" class="platform-link">
            <div class="platform-card ss-card">
                <img src="{{ url_for('static', filename='safespace_3d.png') }}" alt="SafeSpace">
                <div class="platform-name">SafeSpace Chat</div>
            </div>
        </a>

        <a href="javascript:void(0);" onclick="navigateToCalendar('youtube')" class="platform-link">
            <div class="platform-card yt-card">
                <img src="{{ url_for('static', filename='From KlickPin CF Social Media Icon Youtube 3D Premium PSD.jpg') }}" alt="YouTube">
                <div class="platform-name">YouTube</div>
            </div>
        </a>

        <a href="javascript:void(0);" onclick="navigateToCalendar('instagram')" class="platform-link">
            <div class="platform-card ig-card">
                <img src="{{ url_for('static', filename='Social media icon instagram 3d _ Premium PSD _ Social media icons Media icon Instagram icons.jpg') }}" alt="Instagram">
                <div class="platform-name">Instagram</div>
            </div>
        </a>

        <a href="javascript:void(0);" onclick="navigateToCalendar('reddit')" class="platform-link">
            <div class="platform-card rd-card">
                <img src="{{ url_for('static', filename='Reddit.png') }}" alt="Reddit">
                <div class="platform-name">Reddit</div>
            </div>
        </a>

        <a href="javascript:void(0);" onclick="navigateToCalendar('twitter')" class="platform-link">
            <div class="platform-card tw-card">
                <img src="{{ url_for('static', filename='Twitter.png') }}" alt="Twitter">
                <div class="platform-name">Twitter / X</div>
            </div>
        </a>

        <a href="javascript:void(0);" onclick="navigateToCalendar('safespace')" class="platform-link">
            <div class="platform-card ss-card"><img src="{{ url_for('static', filename='safespace_3d.png') }}"><div class="platform-name">SafeSpace Chat</div></div>
        </a>
        <a href="javascript:void(0);" onclick="navigateToCalendar('youtube')" class="platform-link">
            <div class="platform-card yt-card"><img src="{{ url_for('static', filename='From KlickPin CF Social Media Icon Youtube 3D Premium PSD.jpg') }}"><div class="platform-name">YouTube</div></div>
        </a>
        <a href="javascript:void(0);" onclick="navigateToCalendar('instagram')" class="platform-link">
            <div class="platform-card ig-card"><img src="{{ url_for('static', filename='Social media icon instagram 3d _ Premium PSD _ Social media icons Media icon Instagram icons.jpg') }}"><div class="platform-name">Instagram</div></div>
        </a>
    </div>
</div>

<footer>AWAREME INTERFACE 2026</footer>

<script>
    function navigateToCalendar(platform) {
        document.getElementById('track').style.animationPlayState = 'paused';
        gsap.to(".carousel-container, header, footer", {
            y: -50,
            opacity: 0,
            duration: 0.6,
            ease: "power2.inOut",
            onComplete: () => {
                window.location.href = "/calendar?platform=" + platform; 
            }
        });
    }
</script>

</body>
</html>
